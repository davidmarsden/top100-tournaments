name: Apply V2.2 public page switcher

on:
  workflow_dispatch:
  push:
    paths:
      - scripts/apply-v2-2-public-page-switcher.mjs
      - .github/workflows/apply-v2-2-public-page-switcher.yml

permissions:
  contents: write

jobs:
  wire:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Wire public switcher
        run: node scripts/apply-v2-2-public-page-switcher.mjs
      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/components/PublicTournamentPage.jsx src/tournament-hub.css
            git commit -m "Wire public tournament switcher"
            git push
          fi
