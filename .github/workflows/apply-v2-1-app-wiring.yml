name: Apply V2.1 app wiring

on:
  workflow_dispatch:
  push:
    paths:
      - scripts/apply-v2-1-app-wiring.mjs
      - .github/workflows/apply-v2-1-app-wiring.yml

permissions:
  contents: write

jobs:
  wire:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply V2.1 app wiring
        run: node scripts/apply-v2-1-app-wiring.mjs
      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/App.jsx
            git commit -m "Wire V2.1 multi-tournament foundation"
            git push
          fi
