name: Verify Challonge team name fallbacks

on:
  workflow_dispatch:
  push:
    paths:
      - scripts/store-challonge-team-name-fallbacks.mjs
      - netlify/functions/challonge-import.js
      - netlify/functions/lib/challongeImporter.js
      - .github/workflows/store-challonge-team-name-fallbacks.yml

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Verify team name fallbacks
        run: node scripts/store-challonge-team-name-fallbacks.mjs
