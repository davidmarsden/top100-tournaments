name: Improve spotlight copy

on:
  workflow_dispatch:
  push:
    paths:
      - scripts/improve-spotlight-copy.mjs
      - .github/workflows/improve-spotlight-copy.yml

permissions:
  contents: write

jobs:
  improve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Improve spotlight copy
        run: node scripts/improve-spotlight-copy.mjs
      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/components/PublicTournamentPage.jsx
            git commit -m "Improve spotlight copy variety"
            git push
          fi
