name: Use spotlight module

on:
  workflow_dispatch:
  push:
    paths:
      - scripts/use-spotlight-module.mjs
      - .github/workflows/use-spotlight-module.yml

permissions:
  contents: write

jobs:
  wire:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Use spotlight module
        run: node scripts/use-spotlight-module.mjs
      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/components/PublicTournamentPage.jsx
            git commit -m "Use extracted spotlight engine"
            git push
          fi
