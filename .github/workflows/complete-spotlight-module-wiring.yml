name: Complete spotlight module wiring

on:
  workflow_dispatch:
  push:
    paths:
      - scripts/complete-spotlight-module-wiring.mjs
      - .github/workflows/complete-spotlight-module-wiring.yml

permissions:
  contents: write

jobs:
  wire:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Complete spotlight module wiring
        run: node scripts/complete-spotlight-module-wiring.mjs
      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/components/PublicTournamentPage.jsx
            git commit -m "Complete spotlight module wiring"
            git push
          fi
